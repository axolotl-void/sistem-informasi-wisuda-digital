services:
  postgres:
    image: postgres:16-alpine
    container_name: wisuda_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wisuda_digital
    ports:
      - "5432:5432"
    volumes:
      - wisuda_pgdata:/var/lib/postgresql/data

volumes:
  wisuda_pgdata:
